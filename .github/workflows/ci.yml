name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: License check
        run: go-licenses check ./... --allowed_licenses=Apache-2.0,MIT,BSD-3-Clause,BSD-2-Clause,ISC
